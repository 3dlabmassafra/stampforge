<!-- Loader -->
<div id="loader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; color: #00ff9d;">
  <div class="spinner"></div>
  <p style="margin-top: 20px; font-size: 1.1rem;">Generazione stampi in corso...</p>
</div>

<!-- Pulsante Reset Camera -->
<button id="btn-reset-camera" style="position: absolute; top: 20px; right: 20px; z-index: 10; padding: 10px 16px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 6px; cursor: pointer;">
  🔄 Reset Camera
</button>

<!-- Toggle Mirror -->
<div class="control-group">
  <label>
    <input type="checkbox" id="mirror-toggle">
    Specchia design (Mirror)
  </label>
</div>
