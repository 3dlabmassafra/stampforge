<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StampForge - Generatore Stampi 3D</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/SVGLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/utils/BufferGeometryUtils.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --accent: #00ff9d;
      --text: #eeeeee;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0f0f0f;
      padding: 15px 25px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    h1 {
      color: var(--accent);
      font-size: 28px;
      letter-spacing: 2px;
    }
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 340px;
      background: var(--panel);
      border-right: 1px solid #222;
      padding: 20px;
      overflow-y: auto;
    }
    .viewer {
      flex: 1;
      position: relative;
      background: #000;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .control-group {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #aaa;
    }
    input[type="range"] {
      width: 100%;
    }
    button {
      background: #1a1a1a;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
    }
    button.primary {
      background: var(--accent);
      color: #000;
      font-weight: bold;
    }
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 25px 40px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      display: none;
      flex-direction: column;
      align-items: center;
      z-index: 100;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #222;
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>STAMPFORGE</h1>
    <p>SVG → Stampi 3D Professionali</p>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="control-group">
        <h3>Carica SVG</h3>
        <input type="file" id="svg-upload" accept=".svg" style="width:100%; padding:8px; background:#1a1a1a; color:white; border:1px solid #333;">
      </div>

      <div class="control-group">
        <h3>Testo Personalizzato</h3>
        <input type="text" id="custom-text" placeholder="Es: Ferrari" style="width:100%; padding:10px; background:#1a1a1a; border:1px solid #333; color:white;">
        <button id="apply-text">Applica Testo allo Stampo</button>
      </div>

      <div class="control-group">
        <h3>Parametri Stampo</h3>
        <label>Larghezza (mm): <span id="val-width">60</span></label>
        <input type="range" id="width" min="40" max="120" value="60">

        <label>Altezza (mm): <span id="val-height">80</span></label>
        <input type="range" id="height" min="40" max="120" value="80">

        <label>Profondità Rilievo (mm): <span id="val-relief">1.8</span></label>
        <input type="range" id="relief" min="0.5" max="3" step="0.1" value="1.8">

        <label>
          <input type="checkbox" id="mirror-toggle"> Specchia Design
        </label>
      </div>

      <button id="btn-generate" class="primary">GENERA STAMPI 3D</button>
      <button id="btn-reset-camera">Reset Camera</button>
    </div>

    <!-- 3D Viewer -->
    <div class="viewer">
      <canvas id="canvas"></canvas>
      <div id="loader" class="loader">
        <div class="spinner"></div>
        <div>Generazione stampi in corso...</div>
      </div>
    </div>
  </div>

  <script src="js/stamp-generator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
