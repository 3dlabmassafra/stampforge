<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StampForge - Generatore Stampi 3D</title>
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
</head>
<body>
  <header>
    <h1>STAMPFORGE</h1>
    <p>SVG → Stampi 3D</p>
  </header>

  <div class="container">
    <!-- Pannello Controlli -->
    <div class="sidebar">
      <!-- Qui va il tuo pannello SVG, testo, parametri... -->
      <h2>Carica SVG</h2>
      <input type="file" id="svg-upload" accept=".svg">
      
      <h2>Testo Personalizzato</h2>
      <input type="text" id="custom-text" placeholder="Scrivi il tuo testo...">
      <button id="apply-text">Applica Testo</button>

      <h2>Parametri Stampo</h2>
      <label>Larghezza (mm): <input type="range" id="width" min="40" max="120" value="60"></label>
      <label>Altezza (mm): <input type="range" id="height" min="40" max="120" value="80"></label>
      <label>Profondità Rilievo: <input type="range" id="relief" min="0.5" max="3" step="0.1" value="1.8"></label>

      <button id="btn-generate" class="primary">Genera Stampi</button>
      <button id="btn-reset-camera">Reset Camera</button>
    </div>

    <!-- Canvas 3D -->
    <div class="viewer">
      <canvas id="canvas"></canvas>
      <div id="loader" class="loader">Generazione in corso...</div>
    </div>
  </div>

  <script src="three.module.js"></script>
  <script src="SVGLoader.js"></script>
  <script src="BufferGeometryUtils.js"></script>
  <script src="js/stamp-generator.js"></script>
  <script src="js/app.js"></script>

  <style>
    .loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; color: #0f0; }
  </style>
</body>
</html>
